<!DOCTYPE html>
<html lang="en">f7
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Max's Projects</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0e8d8;
      --ink: #1a1a18;
      --muted: #9a9690;
      --line: #e0ddd8;
      --accent: #c8553d;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 40px;
    }
    .container { max-width: 560px; margin: 0 auto; width: 100%; }
    header { margin-bottom: 64px; }
    .site-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 10px;
    }
    .site-subtitle {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .projects { list-style: none; }
    .project-item {
      border-top: 1px solid var(--line);
      padding: 22px 0;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s forwards;
    }
    .project-item:last-child { border-bottom: 1px solid var(--line); }
    .project-item:nth-child(1) { animation-delay: 0.1s; }
    .project-item:nth-child(2) { animation-delay: 0.2s; }
    .project-item:nth-child(3) { animation-delay: 0.3s; }
    .project-item:nth-child(4) { animation-delay: 0.4s; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .project-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: inherit;
      gap: 16px;
      transition: color 0.2s;
    }
    .project-link:hover { color: var(--accent); }
    .project-link:hover .arrow { transform: translateX(4px); color: var(--accent); }
    .project-name {
      font-family: 'Instrument Serif', serif;
      font-size: 1.45rem;
      letter-spacing: -0.01em;
    }
    .arrow {
      font-size: 0.85rem;
      color: var(--muted);
      transition: transform 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    footer {
      margin-top: 56px;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 class="site-title">Max's Projects</h1>
      <p class="site-subtitle">A small collection of things I've built</p>
    </header>
    <ul class="projects">
      <li class="project-item">
        <a href="heartbox.html" class="project-link">
          <span class="project-name">Heartbox</span>
          <span class="arrow">→</span>
        </a>
      </li>
      <li class="project-item">
        <a href="maxchess.html" class="project-link">
          <span class="project-name">MaxChess</span>
          <span class="arrow">→</span>
        </a>
      </li>
      <li class="project-item">
        <a href="mealplan.html" class="project-link">
          <span class="project-name">MealPlan</span>
          <span class="arrow">→</span>
        </a>
      </li>
      <li class="project-item">
        <a href="writingapp.html" class="project-link">
          <span class="project-name">Writing App</span>
          <span class="arrow">→</span>
        </a>
      </li>
    </ul>
    <footer>Santa Monica, CA</footer>
  </div>
</body>
</html>
