<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Writing App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --timer-bg: #e8e0d4;
    --timer-dark: #c8bfb0;
    --green: #2d6a4f;
    --green-light: #40916c;
    --green-dim: rgba(45,106,79,0.12);
    --ink: #1a1a18;
    --muted: #888074;
    --paper: #fdfcf8;
    --paper-line: rgba(0,0,0,0.06);
    --shadow: rgba(0,0,0,0.12);
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    display: flex;
    font-family: 'DM Mono', monospace;
    background: var(--timer-bg);
    color: var(--ink);
  }

  /* ── LEFT PANEL ── */
  .timer-panel {
    width: 280px;
    min-width: 280px;
    background: var(--timer-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px 24px;
    border-right: 1px solid var(--timer-dark);
    position: relative;
    overflow: hidden;
  }

  .hem-photo {
    width: 100%;
    height: 160px;
    object-fit: cover;
    object-position: center top;
    border-radius: 4px;
    opacity: 0.82;
    margin-bottom: 20px;
    filter: grayscale(20%) contrast(1.05);
    box-shadow: 0 4px 16px var(--shadow);
  }

  .app-title {
    font-family: 'Lora', serif;
    font-size: 1rem;
    font-weight: 400;
    font-style: italic;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-bottom: 20px;
    text-align: center;
  }

  /* Mode buttons */
  .modes {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    width: 100%;
  }
  .mode-btn {
    flex: 1;
    padding: 6px 4px;
    background: transparent;
    border: 1px solid var(--timer-dark);
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn:hover { border-color: var(--green); color: var(--green); }
  .mode-btn.active {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }

  /* Timer display */
  .timer-display {
    font-family: 'DM Mono', monospace;
    font-size: 3.8rem;
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 10px;
    text-align: center;
  }
  .timer-display.running { color: var(--green); }
  .timer-label {
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    text-align: center;
  }

  /* Session dots */
  .session-dots {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    align-items: center;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--green);
    background: transparent;
    transition: background 0.3s;
  }
  .dot.filled { background: var(--green); }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    width: 100%;
  }
  .ctrl-btn {
    flex: 1;
    padding: 10px 8px;
    border-radius: 3px;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-start {
    background: var(--green);
    color: #fff;
    flex: 2;
  }
  .btn-start:hover { background: var(--green-light); }
  .btn-reset {
    background: transparent;
    border: 1px solid var(--timer-dark);
    color: var(--muted);
  }
  .btn-reset:hover { border-color: var(--green); color: var(--green); }

  /* Stats */
  .stats {
    width: 100%;
    border-top: 1px solid var(--timer-dark);
    padding-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.62rem;
  }
  .stat-key { color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .stat-val { color: var(--ink); font-weight: 500; }

  /* ── RIGHT PANEL ── */
  .notepad {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--paper);
    position: relative;
  }

  .notepad-header {
    padding: 16px 32px;
    border-bottom: 1px solid var(--paper-line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--paper);
  }
  .notepad-title {
    font-family: 'Lora', serif;
    font-size: 0.8rem;
    font-style: italic;
    color: var(--muted);
  }
  .clear-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--paper-line);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: var(--green); color: var(--green); }

  textarea {
    flex: 1;
    background: var(--paper);
    border: none;
    outline: none;
    resize: none;
    padding: 32px;
    font-family: 'Lora', serif;
    font-size: 1rem;
    line-height: 1.85;
    color: var(--ink);
    caret-color: var(--green);
    background-image: repeating-linear-gradient(
      transparent,
      transparent calc(1.85em - 1px),
      var(--paper-line) calc(1.85em - 1px),
      var(--paper-line) 1.85em
    );
    background-position: 0 32px;
  }
  textarea::placeholder { color: rgba(0,0,0,0.2); font-style: italic; }

  .notepad-footer {
    padding: 12px 32px;
    border-top: 1px solid var(--paper-line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--paper);
  }
  .word-count {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .word-count span {
    font-family: 'Lora', serif;
    font-size: 1.4rem;
    font-style: italic;
    color: var(--green);
    font-weight: 600;
    letter-spacing: -0.01em;
    vertical-align: middle;
    margin-left: 4px;
  }

  /* Ring animation for running state */
  @keyframes pulse-ring {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .timer-display.running { animation: pulse-ring 2s ease-in-out infinite; }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    body { flex-direction: column; }

    .timer-panel {
      width: 100%;
      min-width: 100%;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      padding: 10px 14px;
      gap: 8px 12px;
      border-right: none;
      border-bottom: 1px solid var(--timer-dark);
      flex-shrink: 0;
      overflow: visible;
    }

    .hem-photo, .app-title, .session-dots, .stats { display: none; }

    .timer-display {
      font-size: 2.2rem;
      margin-bottom: 0;
      flex-shrink: 0;
    }

    .timer-label {
      font-size: 0.52rem;
      margin-bottom: 0;
      flex-shrink: 0;
      align-self: flex-end;
      padding-bottom: 6px;
    }

    .modes {
      margin-bottom: 0;
      flex: 1;
      min-width: 0;
    }

    .mode-btn { padding: 5px 3px; font-size: 0.5rem; }

    .controls {
      margin-bottom: 0;
      width: auto;
      flex-shrink: 0;
    }

    .ctrl-btn { padding: 8px 10px; font-size: 0.6rem; }

    .notepad { flex: 1; min-height: 0; }

    textarea {
      padding: 16px;
      font-size: 0.95rem;
      line-height: 1.8;
    }

    .notepad-header, .notepad-footer { padding: 10px 16px; }
  }
</style>
</head>

  <div class="app-title">write something true</div>

  <div class="modes">
    <button class="mode-btn active" onclick="setMode(25, 'Focus', this)">25 min</button>
    <button class="mode-btn" onclick="setMode(5, 'Break', this)">5 min</button>
    <button class="mode-btn" onclick="setMode(15, 'Long', this)">15 min</button>
  </div>

  <div class="timer-display" id="timer">25:00</div>
  <div class="timer-label" id="timer-label">Focus</div>

  <div class="session-dots" id="dots">
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
    <div class="dot" id="d4"></div>
  </div>

  <div class="controls">
    <button class="ctrl-btn btn-start" id="startBtn" onclick="toggleTimer()">Start</button>
    <button class="ctrl-btn btn-reset" onclick="resetTimer()">Reset</button>
  </div>

  <div class="stats">
    <div class="stat-row">
      <span class="stat-key">Sessions</span>
      <span class="stat-val" id="stat-sessions">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-key">Focus time</span>
      <span class="stat-val" id="stat-focus">0 min</span>
    </div>
    <div class="stat-row">
      <span class="stat-key">Words written</span>
      <span class="stat-val" id="stat-words">0</span>
    </div>
  </div>
</div>

<div class="notepad">
  <div class="notepad-header">
    <span class="notepad-title">Today's writing</span>
    <button class="clear-btn" onclick="clearPad()">Clear</button>
  </div>
  <textarea id="pad" placeholder="The first draft of anything is shit. — Hemingway"></textarea>
  <div class="notepad-footer">
    <span class="word-count">Words: <span id="wc">0</span></span>
    <span class="word-count">Characters: <span id="cc">0</span></span>
  </div>
</div>

<script>
  var totalSeconds, currentMode, interval, running, sessions, focusMinutes;
  totalSeconds = 25 * 60;
  currentMode = 'Focus';
  interval = null;
  running = false;
  sessions = 0;
  focusMinutes = 0;

  function setMode(mins, label, btn) {
    document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentMode = label;
    totalSeconds = mins * 60;
    resetTimer();
    document.getElementById('timer-label').textContent = label;
  }

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function updateDisplay() {
    var m = Math.floor(totalSeconds / 60);
    var s = totalSeconds % 60;
    document.getElementById('timer').textContent = pad(m) + ':' + pad(s);
  }

  function toggleTimer() {
    if (running) {
      clearInterval(interval);
      running = false;
      document.getElementById('startBtn').textContent = 'Resume';
      document.getElementById('timer').classList.remove('running');
    } else {
      running = true;
      document.getElementById('startBtn').textContent = 'Pause';
      document.getElementById('timer').classList.add('running');
      interval = setInterval(function() {
        if (totalSeconds <= 0) {
          clearInterval(interval);
          running = false;
          document.getElementById('startBtn').textContent = 'Start';
          document.getElementById('timer').classList.remove('running');
          if (currentMode === 'Focus') {
            sessions++;
            focusMinutes += 25;
            updateDots();
            updateStats();
          }
          return;
        }
        totalSeconds--;
        updateDisplay();
      }, 1000);
    }
  }

  function resetTimer() {
    clearInterval(interval);
    running = false;
    timerStarted = false;
    document.getElementById('startBtn').textContent = 'Start';
    document.getElementById('timer').classList.remove('running');
    var mins = currentMode === 'Focus' ? 25 : currentMode === 'Break' ? 5 : 15;
    totalSeconds = mins * 60;
    updateDisplay();
  }

  function updateDots() {
    var dots = document.querySelectorAll('.dot');
    dots.forEach(function(d, i) {
      d.classList.toggle('filled', i < (sessions % 4));
    });
    if (sessions % 4 === 0 && sessions > 0) {
      dots.forEach(function(d) { d.classList.add('filled'); });
      setTimeout(function() { dots.forEach(function(d) { d.classList.remove('filled'); }); }, 600);
    }
  }

  function updateStats() {
    document.getElementById('stat-sessions').textContent = sessions;
    document.getElementById('stat-focus').textContent = focusMinutes + ' min';
    document.getElementById('stat-words').textContent = document.getElementById('wc').textContent;
  }

  function clearPad() {
    if (confirm('Clear everything?')) {
      document.getElementById('pad').value = '';
      document.getElementById('wc').textContent = '0';
      document.getElementById('cc').textContent = '0';
    }
  }

  var timerStarted = false;

  document.getElementById('pad').addEventListener('input', function() {
    var text = this.value.trim();
    var words = text === '' ? 0 : text.split(/\s+/).length;
    document.getElementById('wc').textContent = words;
    document.getElementById('cc').textContent = this.value.length;
    document.getElementById('stat-words').textContent = words;

    // Auto-start timer on first word typed
    if (!timerStarted && words >= 1 && !running) {
      timerStarted = true;
      toggleTimer();
    }
  });
</script>
</body>
</html>
