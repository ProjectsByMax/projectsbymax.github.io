<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Box</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #5a0a14;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    cursor: default;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 70% at 50% 40%, #7a0f1c 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 15% 85%, #3d0810 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 85% 10%, #620c18 0%, transparent 55%);
    pointer-events: none;
  }

  .hearts-bg { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }

  .bg-heart {
    position: absolute;
    color: rgba(255, 100, 130, 0.18);
    font-size: var(--hs, 18px);
    animation: float-heart var(--hd, 12s) ease-in-out var(--hdelay, 0s) infinite;
    left: var(--hleft, 50%);
    bottom: -60px;
    user-select: none;
    line-height: 1;
  }

  @keyframes float-heart {
    0% { transform: translateY(0) translateX(0) rotate(var(--hr, 0deg)) scale(1); opacity: 0; }
    8% { opacity: var(--ho, 0.7); }
    50% { transform: translateY(calc(var(--rise, -55vh))) translateX(var(--drift, 20px)) rotate(calc(var(--hr, 0deg) + 25deg)) scale(1.05); opacity: var(--ho, 0.7); }
    92% { opacity: calc(var(--ho, 0.7) * 0.3); }
    100% { transform: translateY(calc(var(--rise, -55vh) * 1.9)) translateX(calc(var(--drift, 20px) * 1.5)) rotate(calc(var(--hr, 0deg) + 40deg)) scale(0.5); opacity: 0; }
  }

  .inscription { text-align: center; margin-bottom: 6px; line-height: 1; position: relative; z-index: 2; }
  .inscription .line1 { font-family: 'Great Vibes', cursive; font-size: 2.8rem; color: rgba(255,225,170,0.95); text-shadow: 0 0 22px rgba(255,175,70,0.5), 0 2px 6px rgba(0,0,0,0.6); display: block; line-height: 1.1; }
  .inscription .divider { display: block; font-size: 0.5rem; color: rgba(255,195,120,0.4); letter-spacing: 0.5em; margin: 1px 0; }
  .inscription .line2 { font-family: 'Great Vibes', cursive; font-size: 1.9rem; color: rgba(255,208,138,0.88); text-shadow: 0 0 15px rgba(255,165,60,0.45), 0 2px 5px rgba(0,0,0,0.6); display: block; line-height: 1.2; }

  .scene-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; z-index: 1; }
  .scene { width: 300px; height: 320px; perspective: 900px; cursor: pointer; position: relative; margin-top: 4px; }

  .box-group { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transform: rotateX(20deg) rotateY(-15deg); transition: transform 0.4s ease; }
  .scene:hover .box-group:not(.twirling):not(.opened):not(.resetting) { transform: rotateX(18deg) rotateY(-12deg) scale(1.04); }

  .box-group-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }
  .twirling .box-group-inner { animation: box-twirl 1.0s cubic-bezier(0.42, 0, 0.58, 1) forwards; }
  @keyframes box-twirl { 0% { transform: rotateY(0deg) scale(1); } 100% { transform: rotateY(360deg) scale(1); } }

  .box-bottom { position: absolute; width: 260px; height: 220px; top: 90px; left: 20px; transform-style: preserve-3d; }
  .bottom-front { position: absolute; width: 260px; height: 220px; background: linear-gradient(160deg, #8b1a2a 0%, #5c0f1a 40%, #3d0a12 100%); border: 1px solid rgba(200,110,70,0.3); box-shadow: inset 0 0 30px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,170,110,0.18); overflow: hidden; clip-path: polygon(0 30%, 13% 0%, 87% 0%, 100% 30%, 100% 100%, 0 100%); }
  .bottom-front::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px); }
  .bottom-right { position: absolute; width: 55px; height: 220px; background: linear-gradient(180deg, #4a0d16 0%, #2d0810 100%); border: 1px solid rgba(140,70,40,0.2); transform: rotateY(90deg) translateZ(260px); top: 0; left: 0; transform-origin: left center; clip-path: polygon(0 30%, 100% 30%, 100% 100%, 0 100%); }
  .bottom-base { position: absolute; width: 260px; height: 55px; background: linear-gradient(180deg, #3a0c14 0%, #220709 100%); border: 1px solid rgba(140,70,40,0.2); transform: rotateX(-90deg) translateZ(220px); top: 0; left: 0; transform-origin: top center; }

  .box-lid { position: absolute; width: 260px; height: 180px; top: 0; left: 20px; transform-style: preserve-3d; transform-origin: bottom center; transition: transform 1.1s cubic-bezier(0.25, 0.1, 0.25, 1); }
  .opened .box-lid { transform: rotateX(-125deg); }

  .lid-front { position: absolute; width: 260px; height: 180px; top: 0; left: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
  .lid-face-inner { width: 260px; height: 180px; background: linear-gradient(160deg, #a82035 0%, #6e1020 40%, #4a0a18 100%); border: 1px solid rgba(220,130,80,0.4); box-shadow: inset 0 0 40px rgba(0,0,0,0.4), inset 0 2px 0 rgba(255,185,120,0.2), 0 0 20px rgba(130,25,45,0.3); overflow: hidden; clip-path: url(#heartClipLid); position: relative; }
  .lid-face-inner::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px); pointer-events: none; }
  .lid-sheen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,215,170,0.15) 0%, transparent 55%); pointer-events: none; }

  .lid-inner-face { position: absolute; width: 260px; height: 180px; top: 0; left: 0; transform: rotateX(180deg); backface-visibility: hidden; -webkit-backface-visibility: hidden; overflow: hidden; clip-path: url(#heartClipLid); }
  .lid-bowl { width: 100%; height: 100%; background: radial-gradient(ellipse 80% 60% at 50% 65%, #3d0010 0%, #1a0008 50%, #0d0005 100%); position: relative; overflow: hidden; }
  .lid-bowl::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 90% 30% at 50% 5%, rgba(170,70,90,0.3) 0%, transparent 70%), radial-gradient(ellipse 60% 20% at 15% 50%, rgba(130,45,65,0.18) 0%, transparent 60%), radial-gradient(ellipse 60% 20% at 85% 50%, rgba(130,45,65,0.18) 0%, transparent 60%); }
  .lid-bowl::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(-45deg, transparent, transparent 3px, rgba(0,0,0,0.11) 3px, rgba(0,0,0,0.11) 6px); pointer-events: none; }
  .pearl-hearts { position: absolute; inset: 0; pointer-events: none; }
  .pearl { position: absolute; line-height: 1; opacity: 0; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.7)) drop-shadow(0 0 4px rgba(255,205,215,0.35)); color: var(--pc, #f5e6e8); transform: scale(0.3) rotate(var(--pr, 0deg)); }
  .opened .pearl { animation: pearl-settle var(--pd, 0.5s) cubic-bezier(0.34,1.56,0.64,1) var(--delay, 0s) forwards; }
  @keyframes pearl-settle { 0% { opacity: 0; transform: scale(0) rotate(var(--pr)) translateY(-8px); } 60% { opacity: 1; transform: scale(1.15) rotate(var(--pr)) translateY(2px); } 85% { transform: scale(0.95) rotate(var(--pr)) translateY(0); } 100% { opacity: var(--po, 0.88); transform: scale(1) rotate(var(--pr)) translateY(0); } }
  .resetting .pearl { animation: none !important; opacity: 0 !important; transform: scale(0.3) !important; }

  .lid-top { position: absolute; width: 260px; height: 50px; background: linear-gradient(180deg, #7a1525 0%, #4a0a18 100%); transform: rotateX(90deg) translateZ(-50px); top: 0; left: 0; transform-origin: top center; clip-path: url(#heartClipTop); }
  .lid-right { position: absolute; width: 50px; height: 180px; background: linear-gradient(180deg, #5a0e1e 0%, #3a0a14 100%); transform: rotateY(90deg) translateZ(260px); top: 0; left: 0; transform-origin: left center; clip-path: polygon(0 40%, 100% 40%, 100% 100%, 0 100%); }

  .clasp { position: absolute; width: 36px; height: 28px; left: 50%; transform: translateX(-50%) translateZ(2px); top: 158px; z-index: 10; transform-style: preserve-3d; }
  .clasp-base { width: 36px; height: 18px; background: linear-gradient(180deg, #e8c97a 0%, #b8912a 50%, #d4a840 100%); border-radius: 4px 4px 0 0; border: 1px solid rgba(255,218,110,0.5); box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,238,175,0.6); position: relative; top: 10px; }
  .clasp-hook { width: 24px; height: 14px; background: linear-gradient(180deg, #d4a840 0%, #8a6010 100%); border: 1px solid rgba(218,175,70,0.4); border-radius: 12px 12px 0 0; margin: 0 auto; position: relative; transform-origin: bottom center; transition: transform 0.5s ease 0.3s; box-shadow: 0 -2px 6px rgba(0,0,0,0.4); }
  .clasp-hook::before { content: ''; position: absolute; inset: 3px; border-radius: 8px 8px 0 0; border: 1px solid rgba(255,228,145,0.4); border-bottom: none; }
  .opened .clasp-hook { transform: rotateX(60deg) translateY(-8px); }

  .note-container { position: absolute; width: 210px; left: 50%; transform: translateX(-50%) translateZ(5px); top: 110px; z-index: 5; opacity: 0; pointer-events: none; }
  .opened .note-container { animation: note-emerge 1s ease 0.75s forwards; }
  @keyframes note-emerge { 0% { opacity: 0; transform: translateX(-50%) translateZ(5px) translateY(0); } 30% { opacity: 1; } 100% { opacity: 1; transform: translateX(-50%) translateZ(5px) translateY(-140px); } }
  .note-paper { background: linear-gradient(160deg, #fdf8f0 0%, #f5eedd 100%); border-radius: 3px; padding: 16px 16px 14px; box-shadow: 0 6px 28px rgba(0,0,0,0.7), 0 0 0 1px rgba(195,165,95,0.3), inset 0 0 20px rgba(195,165,95,0.07); position: relative; transform: rotateZ(-1.5deg); }
  .note-paper::after { content: ''; position: absolute; inset: 36px 12px 12px; background: repeating-linear-gradient(180deg, transparent, transparent 22px, rgba(175,155,115,0.18) 22px, rgba(175,155,115,0.18) 23px); pointer-events: none; }
  .note-heart-stamp { text-align: center; font-size: 0.8rem; color: #be3c47; margin-bottom: 6px; letter-spacing: 0.3em; }
  .note-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.82rem; line-height: 1.72; color: #2e1a0a; text-align: center; position: relative; z-index: 1; min-height: 56px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .note-quote { display: block; }
  .note-attribution { display: block; font-family: 'Playfair Display', serif; font-style: normal; font-size: 0.67rem; color: #8a5530; letter-spacing: 0.04em; margin-top: 4px; }

  .sparkle { position: absolute; pointer-events: none; font-size: 1rem; opacity: 0; z-index: 20; }
  .opened .sparkle { animation: sparkle-burst 1.3s ease forwards; }
  @keyframes sparkle-burst { 0% { opacity: 0; transform: translate(0,0) scale(0); } 30% { opacity: 1; transform: translate(var(--sx),var(--sy)) scale(1); } 100% { opacity: 0; transform: translate(calc(var(--sx)*2), calc(var(--sy)*2)) scale(0.15); } }

  .hint { font-family: 'Cormorant Garamond', serif; font-style: italic; color: rgba(255,195,155,0.42); font-size: 0.78rem; letter-spacing: 0.22em; margin-top: 4px; transition: opacity 0.4s; position: relative; z-index: 2; }
  .hint.hidden { opacity: 0; pointer-events: none; }

  .glow { position: absolute; width: 200px; height: 40px; background: radial-gradient(ellipse, rgba(175,28,48,0.55) 0%, transparent 70%); bottom: -20px; left: 50%; transform: translateX(-50%); filter: blur(12px); pointer-events: none; }

  .resetting .box-lid { transition: transform 0.5s cubic-bezier(0.5,0,1,0.5) !important; }
  .resetting .clasp-hook { transition: transform 0.3s ease !important; }
  .resetting .note-container { animation: none !important; opacity: 0 !important; }
  .resetting .sparkle { animation: none !important; opacity: 0 !important; }
  .resetting .box-group-inner { animation: none !important; }
</style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <clipPath id="heartClipLid" clipPathUnits="userSpaceOnUse">
      <path d="M130,165 C60,120 0,90 0,55 C0,20 25,0 55,0 C80,0 105,18 130,40 C155,18 180,0 205,0 C235,0 260,20 260,55 C260,90 200,120 130,165 Z"/>
    </clipPath>
    <clipPath id="heartClipTop" clipPathUnits="userSpaceOnUse">
      <path d="M130,50 C60,35 0,25 0,12 C0,0 30,0 65,10 C95,0 130,0 130,0 C130,0 165,0 195,10 C230,0 260,0 260,12 C260,25 200,35 130,50 Z"/>
    </clipPath>
  </defs>
</svg>

<div class="scene-wrapper">
  <div class="inscription">
    <span class="line1">My Love,</span>
    <span class="divider">· · ·</span>
    <span class="line2">Anytime You Need It</span>
  </div>

  <div class="scene" id="scene" onclick="handleClick()">
    <div class="box-group" id="boxGroup">
      <div class="box-group-inner" id="boxInner">
        <div class="glow"></div>
        <div class="box-lid">
          <div class="lid-front">
            <div class="lid-face-inner"><div class="lid-sheen"></div></div>
          </div>
          <div class="lid-inner-face">
            <div class="lid-bowl">
              <div class="pearl-hearts" id="pearlHearts"></div>
            </div>
          </div>
          <div class="lid-top"></div>
          <div class="lid-right"></div>
        </div>
        <div class="clasp">
          <div class="clasp-hook"></div>
          <div class="clasp-base"></div>
        </div>
        <div class="box-bottom">
          <div class="bottom-front"></div>
          <div class="bottom-right"></div>
          <div class="bottom-base"></div>
        </div>
        <div class="note-container">
          <div class="note-paper">
            <div class="note-heart-stamp">♥ · · · ♥</div>
            <div class="note-text">
              <span class="note-quote" id="quoteText"></span>
              <span class="note-attribution" id="quoteAttr"></span>
            </div>
          </div>
        </div>
        <div class="sparkle" style="left:50%;top:50%;--sx:-78px;--sy:-68px;animation-delay:0.18s">✦</div>
        <div class="sparkle" style="left:50%;top:50%;--sx:82px;--sy:-58px;animation-delay:0.32s">✧</div>
        <div class="sparkle" style="left:50%;top:50%;--sx:-58px;--sy:62px;animation-delay:0.24s">✦</div>
        <div class="sparkle" style="left:50%;top:50%;--sx:62px;--sy:68px;animation-delay:0.42s">✧</div>
        <div class="sparkle" style="left:50%;top:50%;--sx:-98px;--sy:6px;animation-delay:0.16s;font-size:0.6rem">♥</div>
        <div class="sparkle" style="left:50%;top:50%;--sx:98px;--sy:2px;animation-delay:0.38s;font-size:0.6rem">♥</div>
        <div class="sparkle" style="left:50%;top:50%;--sx:4px;--sy:-94px;animation-delay:0.2s;font-size:0.7rem">✦</div>
        <div class="sparkle" style="left:50%;top:50%;--sx:-40px;--sy:-85px;animation-delay:0.28s;font-size:0.55rem">♥</div>
        <div class="sparkle" style="left:50%;top:50%;--sx:42px;--sy:-80px;animation-delay:0.36s;font-size:0.55rem">✧</div>
      </div>
    </div>
  </div>

  <p class="hint" id="hint">click to open</p>
</div>

<script>
  const heartsBg = document.getElementById('heartsBg');
  const heartChars = ['♥','♡','❤','♥','♥','♡'];
  for (let i = 0; i < 38; i++) {
    const el = document.createElement('div');
    el.className = 'bg-heart';
    const size = 10 + Math.random() * 28, opacity = 0.08 + Math.random() * 0.22;
    const duration = 10 + Math.random() * 18, delay = -(Math.random() * duration);
    const left = Math.random() * 100, drift = (Math.random() - 0.5) * 120;
    const rise = 50 + Math.random() * 55, rotate = (Math.random() - 0.5) * 30;
    el.style.cssText = `--hs:${size}px;--ho:${opacity.toFixed(2)};--hd:${duration.toFixed(1)}s;--hdelay:${delay.toFixed(1)}s;--hleft:${left.toFixed(1)}%;--drift:${drift.toFixed(0)}px;--rise:-${rise.toFixed(0)}vh;--hr:${rotate.toFixed(1)}deg;font-size:${size}px;`;
    el.textContent = heartChars[Math.floor(Math.random() * heartChars.length)];
    heartsBg.appendChild(el);
  }

  const pearlColors = ['#f8e8ec','#f2d5da','#eedde2','#f5eaf0','#fce4ec','#f9dde5','#ffe0e8','#f0d8e0','#fdeef2','#e8d0d8','#f5dde5'];
  function isInsideHeart(x, y, W, H) { const nx=(x-W/2)/(W*0.38),ny=(y-H*0.44)/(H*0.44),v=nx*nx+ny*ny-1; return(v*v*v-nx*nx*ny*ny*ny)<=0; }
  const ph = document.getElementById('pearlHearts');
  const W=260,H=180,COLS=14,ROWS=10;
  for (let row=0;row<ROWS;row++) for (let col=0;col<COLS;col++) {
    const jx=(Math.random()-.5)*10,jy=(Math.random()-.5)*10;
    const x=(col/(COLS-1))*(W-24)+12+jx, y=(row/(ROWS-1))*(H-22)+8+jy;
    if (!isInsideHeart(x,y,W,H)) continue;
    const bias=0.3+0.7*(y/H);
    if (Math.random()>bias+0.15) continue;
    const el=document.createElement('div'); el.className='pearl';
    const size=8+Math.random()*10, delay=0.2+(y/H)*0.4+Math.random()*0.25;
    el.style.cssText=`left:${x}px;top:${y}px;--pc:${pearlColors[Math.floor(Math.random()*pearlColors.length)]};--pr:${((Math.random()-.5)*30).toFixed(1)}deg;--po:${(0.72+Math.random()*0.28).toFixed(2)};--delay:${delay.toFixed(2)}s;--pd:${(0.38+Math.random()*0.25).toFixed(2)}s;font-size:${size}px;margin-left:-${size/2}px;margin-top:-${size/2}px;`;
    el.textContent='♥'; ph.appendChild(el);
  }

  const quotes = [
    { text: "In all the world, there is no heart for me like yours. In all the world, there is no love for you like mine.", attr: "— Maya Angelou" },
    { text: "I love you without knowing how, or when, or from where. I love you simply, without problems or pride.", attr: "— Pablo Neruda" },
    { text: "I saw that you were perfect, and so I loved you. Then I saw that you were not perfect and I loved you even more.", attr: "— Angelita Lim" },
    { text: "Being deeply loved by someone gives you strength, while loving someone deeply gives you courage.", attr: "— Lao Tzu" },
    { text: "You know you're in love when you can't fall asleep because reality is finally better than your dreams.", attr: "— Dr. Seuss" },
    { text: "To love and be loved is to feel the sun from both sides.", attr: "— David Viscott" },
    { text: "Love is friendship that has caught fire.", attr: "— Ann Landers" },
    { text: "For small creatures such as we, the vastness is bearable only through love.", attr: "— Carl Sagan" },
    { text: "I love you more than my own skin.", attr: "— Frida Kahlo" },
    { text: "Love is composed of a single soul inhabiting two bodies.", attr: "— Aristotle" },
    { text: "There is no remedy for love but to love more.", attr: "— Henry David Thoreau" },
    { text: "The best thing to hold onto in life is each other.", attr: "— Audrey Hepburn" },
    { text: "I carry your heart with me. I carry it in my heart.", attr: "— E.E. Cummings" },
    { text: "I love you straightforwardly, so close that your hand on my chest is my hand.", attr: "— Pablo Neruda" },
    { text: "At the touch of love, everyone becomes a poet.", attr: "— Plato" },
    { text: "Whatever our souls are made of, his and mine are the same.", attr: "— Emily Brontë" },
    { text: "I choose you. And I'll choose you over and over and over. Without pause, without a doubt, in a heartbeat.", attr: "— Unknown" },
    { text: "You are the poem I never knew how to write and this life is the story I have always wanted to tell.", attr: "— Tyler Knott Gregson" },
    { text: "I think I'd miss you even if we'd never met.", attr: "— The Wedding Date" },
    { text: "Every atom of me loves every atom of you.", attr: "— Philip Pullman" },
    { text: "Out beyond ideas of wrongdoing and rightdoing, there is a field. I'll meet you there.", attr: "— Rumi" },
    { text: "To love another person is to see the face of God.", attr: "— Les Misérables" },
    { text: "You have bewitched me body and soul, and I love, I love, I love you.", attr: "— Pride and Prejudice" },
    { text: "I wanted it to be you. I wanted it to be you so badly.", attr: "— You've Got Mail" },
    { text: "Do I love you? My God, if your love were a grain of sand, mine would be a universe of beaches.", attr: "— The Princess Bride" },
  ];

  let shuffled = [], lastIndex = -1, isOpen = false, isAnimating = false;
  function getNextQuote() {
    if (!shuffled.length) { shuffled = [...quotes].sort(() => Math.random() - 0.5); }
    const q = shuffled.shift(); lastIndex = quotes.indexOf(q); return q;
  }
  function handleClick() {
    if (isAnimating) return;
    if (!isOpen) startOpen(); else resetAndReopen();
  }
  function startOpen() {
    isAnimating = true;
    const bg = document.getElementById('boxGroup');
    bg.classList.add('twirling');
    setTimeout(() => {
      bg.classList.remove('twirling');
      bg.classList.add('opened');
      isOpen = true; isAnimating = false;
      const q = getNextQuote();
      document.getElementById('quoteText').textContent = q.text;
      document.getElementById('quoteAttr').textContent = q.attr;
      document.getElementById('hint').textContent = 'click for another';
    }, 1050);
  }
  function resetAndReopen() {
    isAnimating = true;
    const bg = document.getElementById('boxGroup');
    bg.classList.add('resetting');
    bg.classList.remove('opened');
    isOpen = false;
    setTimeout(() => {
      bg.classList.remove('resetting');
      setTimeout(() => { isAnimating = false; startOpen(); }, 100);
    }, 520);
  }
</script>
</body>
</html>
